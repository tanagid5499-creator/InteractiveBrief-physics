<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clicker · จอครู (โปรเจกเตอร์)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<!-- KaTeX (math typesetting) — CDN, pinned 0.16.9, matches the lab pages. Auto-render handles \( … \) / \[ … \] -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<style>
  :root{--page:#f3f7ff;--ink:#14213d;--muted:#51607d;--blue:#1d4fd0;--blue2:#2563eb;--band:#e6eefc;--line:#d6e0f5;--surface:#fff;--accent:#d9480f;}
  *{box-sizing:border-box}
  body{font-family:'Sarabun',sans-serif;background:var(--page);color:var(--ink);margin:0;padding:clamp(1rem,3vw,2rem);line-height:1.5}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:980px;margin:0 auto}
  .topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.6rem 1rem;margin-bottom:1rem}
  .brand{font-weight:700;font-size:1.05rem;color:var(--blue)}
  .brand small{display:block;font-weight:400;font-size:.8rem;color:var(--muted)}
  .session{font-size:.82rem;color:var(--muted)}
  .session b{color:var(--ink)}
  .picker{display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-end;margin-bottom:1.1rem;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:.8rem 1rem}
  .picker .field{display:flex;flex-direction:column;gap:.2rem}
  .picker label{font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .picker select{font-family:'Sarabun',sans-serif;font-size:.95rem;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:9px;padding:.45rem .7rem;min-width:11rem;cursor:pointer}
  .picker .grow{flex:1}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:clamp(1.1rem,3vw,1.8rem);box-shadow:0 1px 3px rgba(20,33,61,.05)}
  .qmeta{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem;flex-wrap:wrap}
  .qno{font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:#fff;background:var(--blue);border-radius:8px;padding:.2rem .6rem;font-weight:600}
  .bloom{font-size:.72rem;color:var(--blue);background:var(--band);border:1px solid var(--line);border-radius:999px;padding:.1rem .55rem}
  .stem{font-size:clamp(1.2rem,2.6vw,1.7rem);font-weight:600;margin:.2rem 0 1.2rem}
  .bars{display:flex;flex-direction:column;gap:.7rem}
  .bar{display:flex;align-items:center;gap:.8rem}
  .key{flex:none;width:2.2rem;height:2.2rem;border-radius:9px;background:var(--band);color:var(--blue);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.05rem;display:grid;place-items:center}
  .barbody{flex:1;min-width:0}
  .barlabel{font-size:.95rem;margin-bottom:.25rem}
  .track{height:1.5rem;background:var(--band);border-radius:8px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--blue2);border-radius:8px;transition:width .35s cubic-bezier(.22,1,.36,1)}
  .count{flex:none;min-width:5.5rem;text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600}
  .foot{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.8rem;margin-top:1.3rem;padding-top:1rem;border-top:1px solid var(--line)}
  .total{font-size:1rem}.total b{font-size:1.3rem;color:var(--blue)}
  .ctrls{display:flex;flex-wrap:wrap;gap:.5rem}
  button{font-family:'Sarabun',sans-serif;font-size:.92rem;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:9px;padding:.5rem .9rem;cursor:pointer;font-weight:500}
  button:hover{background:var(--band)}
  button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  button.primary:hover{background:var(--blue2)}
  button.warn{color:var(--accent);border-color:#f0c9b8}
  button:disabled{opacity:.45;cursor:default}
  .pollstate{font-size:.85rem;font-weight:600}
  .open{color:#0f6e56}.closed{color:var(--accent)}
  .join{margin-top:1rem;font-size:.85rem;color:var(--muted);background:var(--surface);border:1px dashed var(--line);border-radius:10px;padding:.7rem .9rem}
  .join b{color:var(--ink)}
  .note{font-size:.78rem;color:var(--muted);margin-top:.6rem}
  @media (prefers-reduced-motion:reduce){.fill{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">Clicker · จอครู<small id="metaLabel">—</small></div>
    <div class="session">เซสชัน <b id="sid" class="mono">—</b> · <span id="pollState" class="pollstate"></span></div>
  </div>

  <div class="picker">
    <div class="field"><label for="courseSel">คอร์ส</label><select id="courseSel"></select></div>
    <div class="field grow"><label for="labSel">บทปฏิบัติการ</label><select id="labSel"></select></div>
    <div class="field"><label for="qSel">ข้อ</label><select id="qSel"></select></div>
  </div>

  <div class="card">
    <div class="qmeta"><span class="qno" id="qno">ข้อ —</span><span class="bloom" id="bloom" title="ระดับ Bloom (เห็นเฉพาะอาจารย์)">—</span></div>
    <div class="stem" id="stem">—</div>
    <div class="bars" id="bars"></div>
    <div class="foot">
      <div class="total">ตอบแล้ว <b id="total">0</b> คน</div>
      <div class="ctrls">
        <button id="prev">‹ ก่อนหน้า</button>
        <button id="toggle" class="primary">ปิดรับคำตอบ</button>
        <button id="next">ถัดไป ›</button>
        <button id="reset" class="warn">ล้างเซสชันใหม่</button>
      </div>
    </div>
    <p class="note">ไม่เฉลยข้อถูก — ใช้การกระจายคำตอบเพื่อชวนอภิปราย</p>
  </div>

  <div class="join">
    นิสิตเข้าตอบที่ → <b id="respUrl" class="mono">respond.html</b>
    <span class="note" style="display:block;margin-top:.3rem">เดโม: เปิดไฟล์ <b>respond.html</b> อีกแท็บ/อีกหน้าต่างในเครื่องเดียวกัน (สื่อสารผ่าน BroadcastChannel) · เวอร์ชันคลาสจริงจะเป็น QR + Supabase</span>
  </div>
</div>

<!-- registry (no answers) + teacher-only answer key. respond.html loads ONLY questions.js. -->
<script src="questions.js"></script>
<script src="answers.js"></script>
<script>
// init on DOMContentLoaded so the deferred KaTeX scripts have loaded before the first render
document.addEventListener("DOMContentLoaded", function(){
  const REG = window.CLICKER_COURSES;
  const ANSWERS = window.CLICKER_ANSWERS || {};
  const CHANNEL = "labclicker-v2";
  const KEYS = ["A","B","C","D","E"];
  const ch = new BroadcastChannel(CHANNEL);

  let courseId = Object.keys(REG)[0];
  let labId = Object.keys(REG[courseId].labs)[0];
  let qIndex = 0, pollOpen = true, sessionId = Date.now().toString(36);
  const tally = {};   // tally[qKey] = { clientId: "A" }  ·  qKey = course/lab#index

  const curCourse = () => REG[courseId];
  const curLab = () => REG[courseId].labs[labId];
  const curQs = () => curLab().questions;
  const cur = () => curQs()[qIndex];
  const qKey = () => courseId + "/" + labId + "#" + qIndex;
  const votesOf = (k) => tally[k] || (tally[k] = {});

  // dev integrity check (answers stay teacher-only; never rendered) — every question has a key
  (function(){ let miss=0; for(const c of Object.values(REG)) for(const l of Object.values(c.labs)) for(const q of l.questions) if(!ANSWERS[q.id]) miss++; if(miss) console.warn("clicker: "+miss+" question(s) missing answer key"); })();

  const courseSel = document.getElementById("courseSel");
  const labSel = document.getElementById("labSel");
  const qSel = document.getElementById("qSel");

  function fillCourses(){
    courseSel.innerHTML = Object.entries(REG).map(([id,c])=>`<option value="${id}">${id} · ${c.title}</option>`).join("");
    courseSel.value = courseId;
  }
  function fillLabs(){
    labSel.innerHTML = Object.entries(curCourse().labs).map(([id,l],i)=>`<option value="${id}">${String(i+1).padStart(2,"0")} · ${l.title}</option>`).join("");
    labSel.value = labId;
  }
  function fillQs(){
    qSel.innerHTML = curQs().map((q,i)=>`<option value="${i}">ข้อ ${i+1}</option>`).join("");
    qSel.value = String(qIndex);
  }

  function broadcastState(){ ch.postMessage({ type:"state", sessionId, courseId, labId, qIndex, pollOpen, total:curQs().length }); }

  function renderMath(){ if(window.renderMathInElement){ try{ renderMathInElement(document.getElementById("stem"),{delimiters:[{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}],throwOnError:false}); renderMathInElement(document.getElementById("bars"),{delimiters:[{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}],throwOnError:false}); }catch(e){} } }

  function render(){
    const q = cur(), v = votesOf(qKey());
    const counts = {}; KEYS.forEach(k=>counts[k]=0);
    Object.values(v).forEach(c=>{ if(counts[c]!=null) counts[c]++; });
    const totalVotes = Object.keys(v).length;
    document.getElementById("metaLabel").textContent = courseId + " · " + curLab().title;
    document.getElementById("sid").textContent = sessionId;
    document.getElementById("qno").textContent = "ข้อ " + (qIndex+1) + " / " + curQs().length;
    document.getElementById("bloom").textContent = "ระดับ: " + bloomTH(q.bloom);
    document.getElementById("stem").innerHTML = q.prompt;
    document.getElementById("total").textContent = totalVotes;
    const ps = document.getElementById("pollState");
    ps.textContent = pollOpen ? "เปิดรับคำตอบ" : "ปิดรับคำตอบ";
    ps.className = "pollstate " + (pollOpen ? "open" : "closed");
    document.getElementById("toggle").textContent = pollOpen ? "ปิดรับคำตอบ" : "เปิดรับคำตอบ";
    document.getElementById("prev").disabled = qIndex===0;
    document.getElementById("next").disabled = qIndex===curQs().length-1;
    const keys = KEYS.filter(k=>q.options[k]!=null);
    const max = Math.max(1, ...keys.map(k=>counts[k]));
    document.getElementById("bars").innerHTML = keys.map(k=>{
      const n = counts[k], pct = totalVotes? Math.round(n/totalVotes*100):0;
      const w = Math.round(n/max*100);
      return `<div class="bar"><span class="key">${k}</span><div class="barbody"><div class="barlabel">${q.options[k]}</div><div class="track"><div class="fill" style="width:${w}%"></div></div></div><span class="count">${n} · ${pct}%</span></div>`;
    }).join("");
    qSel.value = String(qIndex);
    renderMath();
  }

  function bloomTH(b){ return ({remember:"จำ",understand:"เข้าใจ",apply:"ประยุกต์",analyze:"วิเคราะห์",evaluate:"ประเมิน",create:"สร้างสรรค์"})[b] || b; }

  function goTo(newCourse, newLab, newIndex){
    courseId = newCourse; labId = newLab; qIndex = newIndex; pollOpen = true;
    fillLabs(); fillQs(); broadcastState(); render();
  }

  courseSel.onchange = ()=>{ const c=courseSel.value; goTo(c, Object.keys(REG[c].labs)[0], 0); };
  labSel.onchange = ()=>{ goTo(courseId, labSel.value, 0); };
  qSel.onchange = ()=>{ qIndex = +qSel.value; pollOpen = true; broadcastState(); render(); };

  ch.onmessage = (e)=>{
    const m = e.data; if(!m) return;
    if(m.type==="hello"){ broadcastState(); }
    else if(m.type==="vote" && m.sessionId===sessionId && m.courseId===courseId && m.labId===labId && m.qIndex===qIndex && pollOpen){
      votesOf(qKey())[m.clientId] = m.choice; render();
    }
  };

  document.getElementById("prev").onclick = ()=>{ if(qIndex>0){qIndex--; pollOpen=true; broadcastState(); render();} };
  document.getElementById("next").onclick = ()=>{ if(qIndex<curQs().length-1){qIndex++; pollOpen=true; broadcastState(); render();} };
  document.getElementById("toggle").onclick = ()=>{ pollOpen=!pollOpen; broadcastState(); render(); };
  document.getElementById("reset").onclick = ()=>{
    if(!confirm("ล้างคำตอบทั้งหมดและเริ่มเซสชันใหม่?")) return;
    sessionId = Date.now().toString(36); qIndex=0; pollOpen=true;
    Object.keys(tally).forEach(k=>delete tally[k]);
    broadcastState(); render();
  };

  document.getElementById("respUrl").textContent = location.href.replace(/host\.html.*$/, "respond.html");
  fillCourses(); fillLabs(); fillQs();
  setInterval(broadcastState, 2500);   // heartbeat ให้ผู้ตอบที่เพิ่งเปิดซิงก์สถานะ
  render(); broadcastState();
});
</script>
</body>
</html>
